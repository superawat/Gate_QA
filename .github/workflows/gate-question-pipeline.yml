# FEAT-003: Automated GATE Question Pipeline
# Triggered: Apr 1-5, Oct 1-5 (cron retry window) + manual dispatch with optional force_year
# 6 stages: Scrape → Normalise → Answer Backfill → Merge → Validate → Build & Deploy

name: GATE Question Pipeline

on:
  schedule:
    # Release-window retries: April 1-5 and October 1-5 at 04:00 UTC
    - cron: "0 4 1-5 4,10 *"
  workflow_dispatch:
    inputs:
      force_year:
        description: "Force a specific target year (e.g. 2026). Leave empty to use pipeline-state.json."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: gate-question-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      # ── Setup ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Determine target year
        id: target
        run: |
          if [ -n "${{ github.event.inputs.force_year }}" ]; then
            echo "year=${{ github.event.inputs.force_year }}" >> "$GITHUB_OUTPUT"
          else
            YEAR=$(node -e "const s=JSON.parse(require('fs').readFileSync('pipeline-state.json','utf8'));console.log(s.nextTargetYear)")
            echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard scheduled runs for future target years
        id: guard
        run: |
          CURRENT_YEAR=$(date -u +%Y)
          TARGET_YEAR=${{ steps.target.outputs.year }}

          if [ "${{ github.event_name }}" = "schedule" ] && [ "$TARGET_YEAR" -gt "$CURRENT_YEAR" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Target year $TARGET_YEAR is in the future relative to $CURRENT_YEAR. Skipping scheduled retry."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: npm ci

      # ── Stage 1: Scrape ──────────────────────────────────────────────
      - name: "Stage 1 — Scrape"
        id: scrape
        if: steps.guard.outputs.should_run == 'true'
        run: node scripts/pipeline/scrape.mjs --year ${{ steps.target.outputs.year }}

      - name: Check if new questions found
        id: check_new
        if: steps.guard.outputs.should_run == 'true'
        run: |
          FILE="audit/scraped-${{ steps.target.outputs.year }}.json"
          if [ ! -f "$FILE" ]; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "📭 No scraped data file — off-cycle run."
          else
            COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('$FILE','utf8'));console.log(Array.isArray(d)?d.length:0)")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            if [ "$COUNT" -eq "0" ]; then
              echo "has_new=false" >> "$GITHUB_OUTPUT"
              echo "📭 Zero new questions. Off-cycle — exiting cleanly."
            else
              echo "has_new=true" >> "$GITHUB_OUTPUT"
              echo "✅ Found $COUNT new questions."
            fi
          fi

      # ── Stage 2: Normalise ───────────────────────────────────────────
      - name: "Stage 2 — Normalise"
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: node scripts/pipeline/normalise.mjs --year ${{ steps.target.outputs.year }}

      # ── Stage 3: Answer Backfill ─────────────────────────────────────
      - name: "Stage 3 — Answer Backfill"
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: node scripts/pipeline/answer-backfill.mjs --year ${{ steps.target.outputs.year }}

      # ── Stage 4: Merge ───────────────────────────────────────────────
      - name: "Stage 4 — Merge"
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: node scripts/pipeline/merge.mjs --year ${{ steps.target.outputs.year }}

      # ── Stage 5: Validate (hard gate) ────────────────────────────────
      - name: "Stage 5 — Validate"
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        id: validate
        run: node scripts/pipeline/validate.mjs --year ${{ steps.target.outputs.year }}

      # ── Stage 6: Build & Deploy ──────────────────────────────────────
      - name: "Stage 6 — Build"
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: npm run build

      - name: Verify public parity
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: npm run qa:validate-public-parity

      - name: Verify deploy artifacts
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: |
          test -f dist/.nojekyll
          test -f dist/calculator/calculator.html
          test -f dist/question-bank-manifest.json
          test -f dist/question-search-index.json
          test -d dist/question-detail-shards
          find dist/question-detail-shards -maxdepth 1 -name '*.json' -print -quit | grep -q .

      - name: Update pipeline state for next year
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('pipeline-state.json', 'utf8'));
            state.nextTargetYear = parseInt('${{ steps.target.outputs.year }}', 10) + 1;
            state.lastRunAt = new Date().toISOString();
            state.volumeCheckPassed = true;
            fs.writeFileSync('pipeline-state.json', JSON.stringify(state, null, 2));
          "

      - name: Commit pipeline state and audit files
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pipeline-state.json
          git add audit/
          git add docs/generated/
          git add artifacts/review/remote-image-report.json
          git add public/question-bank-manifest.json
          git add public/question-search-index.json
          git add public/question-detail-shards
          git add public/questions-filtered.json
          git add public/questions-with-answers.json
          git add data/answers/manual-answers-patch-v1.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            YEAR="${{ steps.target.outputs.year }}"
            git commit -m "chore(pipeline): FEAT-003 auto-update for GATE ${YEAR} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Deploy to GitHub Pages
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'true'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: true

      # ── Commit audit files on off-cycle (no deploy) ──────────────────
      - name: Commit audit files (manual off-cycle)
        if: steps.guard.outputs.should_run == 'true' && steps.check_new.outputs.has_new == 'false' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audit/ pipeline-state.json || true
          if git diff --cached --quiet; then
            echo "No audit changes."
          else
            git commit -m "chore(pipeline): off-cycle audit log [skip ci]"
            git push origin HEAD:main
          fi

      # ── Failure: Open GitHub Issue ───────────────────────────────────
      - name: Open GitHub Issue on scrape failure
        if: failure() && steps.guard.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const year = '${{ steps.target.outputs.year }}';
            let errorDetail = 'No additional error details available.';

            // Try to read error/validation files
            for (const f of ['audit/scrape-error.json', 'audit/validation-failure.json']) {
              try {
                const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                errorDetail = '```json\n' + JSON.stringify(data, null, 2) + '\n```';
                break;
              } catch {}
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 FEAT-003 Pipeline Failed — GATE ${year}`,
              body: `## Automated GATE Question Pipeline Failure\n\n` +
                    `**Year:** ${year}\n` +
                    `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
                    `**Timestamp:** ${new Date().toISOString()}\n\n` +
                    `### Error Details\n\n${errorDetail}\n\n` +
                    `### Action Required\n\n` +
                    `1. Check the workflow run logs for details.\n` +
                    `2. The live site is **unaffected** — last successful deploy is still active.\n` +
                    `3. Fix the issue and re-run with \`workflow_dispatch\`.`,
              labels: ['pipeline', 'bug', 'automated'],
            });
