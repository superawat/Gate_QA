# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:


  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'write'
      id-token: 'write'
      pages: "write"
    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run test:unit
    - run: npm run qa:validate-data
    - run: npm run build
    - run: npx playwright install --with-deps chromium
    - run: npm run test:e2e
    - run: npm run qa:a11y:axe
    - run: npm run qa:validate-bundle-budget
    - run: npm run qa:validate-landing-network
    - run: npm run lighthouse:mobile
    - run: npm run qa:validate-public-parity
    - name: Verify nojekyll marker
      run: test -f dist/.nojekyll
    - name: Verify calculator bundle
      run: test -f dist/calculator/calculator.html
    - name: Verify generated public artifacts
      run: |
        test -f dist/question-bank-manifest.json
        test -f dist/question-search-index.json
        test -d dist/question-detail-shards
        find dist/question-detail-shards -maxdepth 1 -name '*.json' -print -quit | grep -q .
    
    - name: Deploy to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        folder: dist
        branch: gh-pages
