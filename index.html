<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Practice GATE CSE previous-year questions with a dedicated Home, Explore, and Solve flow." />
  <title>GateQA</title>
  <link rel="icon" type="image/png" href="./logo.png" />

  <style>
    pre {
      overflow: auto;
    }
  </style>

  <script>
    (function (location) {
      if (location.search[1] !== "/") {
        return;
      }

      var decoded = location.search
        .slice(1)
        .split("&")
        .map(function (segment) {
          return segment.replace(/~and~/g, "&");
        })
        .join("?");

      window.history.replaceState(
        null,
        "",
        location.pathname.slice(0, -1) + decoded + location.hash
      );
    }(window.location));
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>

</html>
