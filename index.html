  <script>
    (function () {
      try {
        var isMockWindow = /\/mock(?:\/|$)/.test(window.location.pathname);
        var storedTheme = window.localStorage.getItem("gate_qa_theme");
        var isStoredThemeValid = storedTheme === "light" || storedTheme === "dark";
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = isMockWindow
          ? "light"
          : (isStoredThemeValid ? storedTheme : (prefersDark ? "dark" : "light"));
        document.documentElement.setAttribute("data-theme", theme);
      } catch (error) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    }());
  </script>

      }

      var decoded = location.search
