<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GateQA Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.12), transparent 26%),
        linear-gradient(180deg, #eef4fb 0%, #f8fbff 18%, #f4f7fb 100%);
      color: #0f172a;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .card {
      width: min(100%, 560px);
      border: 1px solid #d9e2ec;
      border-radius: 24px;
      background: #ffffff;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
    }

    p {
      margin: 16px 0 0;
      line-height: 1.7;
      color: #475569;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    a,
    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .primary {
      background: #0f172a;
      color: #ffffff;
    }

    .secondary {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #334155;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>The cached GateQA shell is still available, but this page was requested before the network came back. Reconnect and retry, or reopen the app to keep working with cached content.</p>
    <div class="actions">
      <button class="primary" type="button" onclick="window.location.reload()">Try again</button>
      <a class="secondary" href="/Gate_QA/">Open GateQA</a>
    </div>
  </main>
</body>
</html>
